name: Quality Gates

on:
  push:
  pull_request:

jobs:
  backend-tests-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend tests
        run: npm test

      - name: Run backend security audit (high+)
        run: npm audit --audit-level=high

  musicwebapp-lint-build-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MusicWebApp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: MusicWebApp/package-lock.json

      - name: Install MusicWebApp dependencies
        run: npm ci

      - name: Lint MusicWebApp
        run: npm run lint

      - name: Build MusicWebApp
        run: npm run build

      - name: Run MusicWebApp security audit (high+)
        run: npm audit --audit-level=high

  admin-lint-build-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        run: npm ci

      - name: Lint admin
        run: npm run lint

      - name: Build admin
        run: npm run build

      - name: Run admin security audit (high+)
        run: npm audit --audit-level=high

  backend-client-build:
    runs-on: ubuntu-latest
    needs:
      - musicwebapp-lint-build-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            MusicWebApp/package-lock.json
            Backend/package-lock.json

      - name: Install and build MusicWebApp dist
        run: |
          cd MusicWebApp
          npm ci
          npm run build

      - name: Install backend dependencies
        run: |
          cd Backend
          npm ci

      - name: Run backend client copy build
        run: |
          cd Backend
          npm run build:client

      - name: Verify copied client artifact
        run: test -f Backend/client-dist/index.html
