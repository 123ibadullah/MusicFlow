name: Quality Gates

on:
  push:
  pull_request:

jobs:
  server-tests-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Run server tests
        run: npm test

      - name: Run server security audit (high+)
        run: npm audit --audit-level=high

  client-lint-build-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Lint client
        run: npm run lint

      - name: Build client
        run: npm run build

      - name: Run client security audit (high+)
        run: npm audit --audit-level=high

  admin-lint-build-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Install admin dependencies
        run: npm ci

      - name: Lint admin
        run: npm run lint

      - name: Build admin
        run: npm run build

      - name: Run admin security audit (high+)
        run: npm audit --audit-level=high

  server-client-dist-build:
    runs-on: ubuntu-latest
    needs:
      - client-lint-build-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install and build client dist
        run: |
          cd client
          npm ci
          npm run build

      - name: Install server dependencies
        run: |
          cd server
          npm ci

      - name: Run server client copy build
        run: |
          cd server
          npm run build:client

      - name: Verify copied client artifact
        run: test -f server/client-dist/index.html
